name: Release tokenboard CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            server/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install frontend dependencies
        run: npm ci --prefix server/frontend

      - name: Run server tests
        run: npm --prefix server test

      - name: Build frontend
        run: npm --prefix server run frontend:build

      - name: Run client tests
        run: cargo test --manifest-path client/Cargo.toml --locked

      - name: Verify installer scripts
        shell: bash
        run: |
          bash -n scripts/install.sh
          pwsh -NoProfile -Command '$tokens = $null; $errors = $null; [System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$tokens, [ref]$errors) > $null; if ($errors.Count) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }'
          grep -q 'tokenboard-x86_64-unknown-linux-musl' scripts/install.sh
          grep -q 'tokenboard-x86_64-unknown-linux-musl' client/src/updater.rs
          grep -q 'tokenboard-aarch64-unknown-linux-musl' scripts/install.sh
          grep -q 'tokenboard-aarch64-unknown-linux-musl' client/src/updater.rs
          grep -q 'tokenboard-arm-unknown-linux-musleabihf' scripts/install.sh
          grep -q 'tokenboard-arm-unknown-linux-musleabihf' client/src/updater.rs
          ! grep -q 'tokenboard-x86_64-unknown-linux-gnu' scripts/install.sh client/src/updater.rs

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: tokenboard-x86_64-unknown-linux-musl
            builder: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: tokenboard-aarch64-unknown-linux-musl
            builder: cross
          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
            asset: tokenboard-arm-unknown-linux-musleabihf
            builder: cross
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: tokenboard-aarch64-apple-darwin
            builder: cargo
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: tokenboard-x86_64-apple-darwin
            builder: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: tokenboard-x86_64-pc-windows-msvc.exe
            builder: cargo

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: matrix.builder == 'cross'
        with:
          tool: cross

      - name: Install musl toolchain dependencies
        if: matrix.builder == 'cargo' && contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build client
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.builder }}" == "cross" ]]; then
            cross build --manifest-path client/Cargo.toml --locked --release --target ${{ matrix.target }}
          else
            cargo build --manifest-path client/Cargo.toml --locked --release --target ${{ matrix.target }}
          fi

      - name: Prepare asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          binary="client/target/${{ matrix.target }}/release/tokenboard"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          cp "$binary" "dist/${{ matrix.asset }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
          else
            sha256sum "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Add installer asset
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1
          sha256sum dist/install.sh > dist/install.sh.sha256
          sha256sum dist/install.ps1 > dist/install.ps1.sha256

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
