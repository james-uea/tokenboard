name: Release tokenboard CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            server/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install frontend dependencies
        run: npm ci --prefix server/frontend

      - name: Run server tests
        run: npm --prefix server test

      - name: Build frontend
        run: npm --prefix server run frontend:build

      - name: Run client tests
        run: cargo test --manifest-path client/Cargo.toml --locked

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tokenboard-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: tokenboard-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: tokenboard-x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: tokenboard-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build client
        run: cargo build --manifest-path client/Cargo.toml --locked --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          binary="client/target/${{ matrix.target }}/release/tokenboard"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          cp "$binary" "dist/${{ matrix.asset }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
          else
            sha256sum "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Add installer asset
        run: |
          cp scripts/install.sh dist/install.sh
          sha256sum dist/install.sh > dist/install.sh.sha256

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
